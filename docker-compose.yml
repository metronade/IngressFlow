services:
  web:
    build:
      context: ./web
      args:
        # Browser-side (NEXT_PUBLIC_*) vars are baked in at build time, not
        # read at container start — the browser, not this container, needs
        # to be able to resolve them. Pulled from .env (NEXT_PUBLIC_API_BASE/
        # NEXT_PUBLIC_WS_BASE) so this is correct for more than just laptop
        # localhost dev:
        #   - pure local dev (no NPM): leave the http://localhost:8000 /
        #     ws://localhost:8000 defaults below.
        #   - a VM/server reachable at an IP or domain, still without NPM in
        #     front (ports published directly): set both to that host, e.g.
        #     NEXT_PUBLIC_API_BASE=http://203.0.113.10:8000 in .env.
        #   - NPM fronting everything on one domain (the intended prod setup,
        #     §2/§4.4): set both to "" (empty) in .env — lib/api.ts and
        #     lib/ws.ts fall back to same-origin, which is what you want.
        # Whichever case applies, `docker compose build web` must be re-run
        # after changing .env — these are baked in, not read at runtime.
        # Single-dash form on purpose: unset -> the localhost default; set to
        # "" explicitly -> stays empty (the same-origin/NPM case). The more
        # common ":-" form can't tell "unset" from "set to empty" apart.
        NEXT_PUBLIC_API_BASE: "${NEXT_PUBLIC_API_BASE-http://localhost:8000}"
        NEXT_PUBLIC_WS_BASE: "${NEXT_PUBLIC_WS_BASE-ws://localhost:8000}"
    env_file: .env
    environment:
      - INTERNAL_API_URL=http://api:8000
    ports: ["3000:3000"] # published for local dev without NPM in front; NPM takes over in prod
    depends_on:
      api:
        condition: service_started

  api:
    build:
      context: .
      dockerfile: api/Dockerfile
    env_file: .env
    ports: ["8000:8000"] # published for local dev without NPM in front; NPM takes over in prod
    volumes:
      - ./api/alembic/versions:/app/api/alembic/versions # migrations must land on the host, not the container layer
      - media:/data/scrapes # read-only in practice — api serves gallery/export, only worker writes
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  worker:
    build:
      context: .
      dockerfile: worker/Dockerfile
    env_file: .env
    shm_size: "1gb" # Chromium (Playwright) needs more than Docker's 64MB default /dev/shm
    volumes:
      - media:/data/scrapes
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      proxy:
        condition: service_started

  beat:
    build:
      context: .
      dockerfile: worker/Dockerfile
    env_file: .env
    command: celery -A celery_app beat --loglevel=info
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  flower:
    build:
      context: .
      dockerfile: worker/Dockerfile
    env_file: .env
    # FLOWER_BASIC_AUTH is "user:pass" (PLAN.md §9 Phase 5 — "Flower behind
    # admin auth"); this is on top of, not instead of, keeping it off the
    # public NPM edge entirely in prod.
    command: sh -c 'celery -A celery_app flower --port=5555 --basic_auth=$$FLOWER_BASIC_AUTH'
    ports: ["5555:5555"] # dev only; put behind an NPM proxy host with admin auth in prod
    depends_on:
      redis:
        condition: service_healthy

  proxy:
    build:
      context: ./proxy
    env_file: .env
    # 8888: plain proxy traffic (workers only). 8889: residential agent
    # WebSocket control channel (§4.8a) — in prod this is *not* published to
    # the host either; NPM fronts it on the same public domain as everything
    # else (wss://<domain>/agent/connect -> proxy:8889), so a residential
    # node never needs an inbound port, and the RZ never needs a new one.
    expose: ["8888", "8889"]

  redis:
    image: redis:7-alpine
    volumes:
      - redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  postgres:
    image: postgres:16-alpine
    env_file: .env
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  media: {}
  redis: {}
  pgdata: {}
