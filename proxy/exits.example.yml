# Upstream exit nodes for the self-hosted proxy gateway (PLAN.md §4.8).
# Not read by the Phase A stub gateway yet — Phase B wires this in.
#
# Each entry is one exit the gateway can rotate through and pin per batch.
# "residential" quality depends entirely on what you attach here (see the
# honest caveat in PLAN.md §4.8) — e.g. a mobile LTE modem/dongle, a home
# endpoint you control, or a self-hosted SOCKS/VPN exit. Without any entries,
# Tier-2 scrape traffic exits via the host's own (datacenter) IP.
exits:
  - name: example-lte-modem
    type: socks5
    host: 192.168.1.50
    port: 1080
    # username: user
    # password: pass
